name: CI/CD
 
on:
  push:
    branches: main
  pull_request:
    branches: main
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
 
    env:
      # Adjust these to match your settings.py / manage.py expectations
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
      DJANGO_SECRET_KEY: ci-test-secret-key
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
 
    steps:
      - name: Check out code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
 
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
 
      - name: Run migrations
        run: python manage.py migrate --noinput
 
      - name: Run tests
        run: python manage.py test account_app
 