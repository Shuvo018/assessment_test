{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Assessment Platform{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style2.css' %}">
  {% block extra_css %}{% endblock %}
</head>

<body>
  {% include "nav.html" %}
  <div class="container">
    {% if messages %}
    <div class="messages">
      {% for m in messages %}
      <div class="message {{ m.tags }}">{{ m }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </div>
</body>

</html>
