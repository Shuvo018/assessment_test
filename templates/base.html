<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Assessment Platform{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(0,0,0,.1), 0 4px 16px rgba(0,0,0,.06);
      padding: 2rem;
      width: 100%;
      max-width: 440px;
      margin: auto;
    }

    .card-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: .25rem;
      text-align: center;
    }

    .card-subtitle {
      font-size: .9rem;
      color: #666;
      text-align: center;
      margin-bottom: 1.75rem;
    }

    .form-group { margin-bottom: 1rem; }

    .form-group label {
      display: block;
      font-size: .85rem;
      font-weight: 500;
      margin-bottom: .4rem;
      color: #333;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: .6rem .85rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: .95rem;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,.15);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }

    .field-error {
      font-size: .8rem;
      color: #dc2626;
      margin-top: .3rem;
    }

    .btn {
      display: block;
      width: 100%;
      padding: .7rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 500;
      cursor: pointer;
      margin-top: 1.25rem;
      transition: background .15s;
    }

    .btn:hover { background: #4f46e5; }

    .link-row {
      text-align: center;
      font-size: .875rem;
      color: #555;
      margin-top: 1.25rem;
    }

    .link-row a { color: #6366f1; text-decoration: none; font-weight: 500; }
    .link-row a:hover { text-decoration: underline; }

    .messages { margin-bottom: 1rem; }

    .message {
      padding: .65rem 1rem;
      border-radius: 8px;
      font-size: .875rem;
      margin-bottom: .5rem;
    }

    .message.success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .message.error   { background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .message.info    { background: #eff6ff; color: #1e40af; border: 1px solid #bfdbfe; }
  </style>
  {% block extra_css %}  {% endblock %}
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
